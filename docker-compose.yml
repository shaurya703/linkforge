services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkforge
      POSTGRES_PASSWORD: linkforge
      POSTGRES_DB: linkforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkforge"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      BASE_URL: "http://localhost:8080"
      POSTGRES_DSN: "postgres://linkforge:linkforge@postgres:5432/linkforge?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
