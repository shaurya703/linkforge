name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -race -count=1 ./internal/shortener/... ./internal/ratelimit/...

      # testcontainers spins up real Postgres + Redis; Docker is preinstalled on
      # the GitHub-hosted ubuntu runner, so this matches the local experience.
      - name: Integration tests
        run: go test -tags=integration -count=1 -timeout 360s ./internal/integration/...
